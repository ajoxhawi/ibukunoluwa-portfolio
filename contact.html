<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Ibukunoluwa</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body{
            background-color: #1f242d;
            color: white;
        }

        a{
            text-decoration: none;
            color: white;
        }
        .navbar{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 9%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #1f242d;
            z-index: 1000;
        }

        .logo{
            font-size: 30px;
            font-weight: 700;
        }

        .navbar ul{
            display: flex;
        }

        .navbar ul li{
            list-style: none;
            margin-left: 35px;
        }

        .navbar ul li a{
            font-size: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .navbar ul li:hover a,
        .navbar ul li.active a{
            color: brown;
        }
        #menu-toggle {
    display: none;
}
.hamburger {
    display: none;
    font-size: 32px;
    color: white;
    cursor: pointer;
}
.navbar ul {
    display: flex;
}
@media (max-width: 850px) {
    .hamburger {
        display: block;
    }
    .navbar .nav-links {
        position: absolute;
        top: 60px;
        right: 0;
        background-color: #1f242d;
        width: 40%;
        display: none;
        flex-direction: column;
        text-align: center;
        border-top: 2px solid brown;
        padding-bottom: 20px;
    }
    .navbar .nav-links li {
        margin: 20px 0;
    }
    #menu-toggle:checked ~ .nav-links {
        display: flex;
    }
}
        .contact {
            padding: 120px 9% 100px;
            margin-top: 60px;
            text-align: center;
        }

        .contact-heading {
            font-size: 45px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .contact-heading span {
            color: brown;
        }

        .contact p {
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .contact-form {
            max-width: 600px;
            margin: auto;
            background-color: #272d37;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid brown;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 13px;
            border: 2px solid brown;
            background: transparent;
            border-radius: 8px;
            margin-bottom: 15px;
            color: white;
            font-size: 15px;
        }

        .contact-form button {
            width: 100%;
            padding: 12px;
            border: none;
            background: brown;
            color: #1f242d;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
        }

        .contact-form button:hover {
            background: transparent;
            border: 2px solid brown;
            color: brown;
        }

        .contact-links {
            margin-top: 35px;
        }

        .contact-links a {
            font-size: 25px;
            margin: 0 10px;
            padding: 10px;
            border: 2px solid brown;
            border-radius: 50%;
            color: brown;
            transition: .3s;
        }

        .contact-links a:hover {
            background: brown;
            color: #1f242d;
            box-shadow: 0 0 10px brown;
        }
        button a{
            color: #1f242d;
        }

    </style>
</head>
<body>

   <nav class="navbar">

    <a href="index.html" class="logo">Ibukunoluwa</a>
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">
        <i class="fa-solid fa-bars"></i>
    </label>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="skills.html">Skills</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
    </ul>

</nav>

    <section class="contact">
        <h2 class="contact-heading">Contact <span>Me</span></h2>
        <p>I'd love to hear from you! Whether you need virtual assistance or have a project in mind, feel free to reach out.</p>
        
        <form class="contact-form" action="#" method="post">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="5" placeholder="Your Message..." required></textarea>
            <button type="submit"><a href="citomababy@gmail.com">Send Message</a></button>
        </form>

        <div class="contact-links">
            <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </section>

</body>
</html>
